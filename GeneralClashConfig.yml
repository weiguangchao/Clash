mode: rule
allow-lan: false
log-level: info
ipv6: true
find-process-mode: strict
tcp-concurrent: true
unified-delay: true
disable-keep-alive: false
keep-alive-interval: 15
keep-alive-idle: 300
profile:
  store-selected: true
  store-fake-ip: true

###############################################################
geodata-mode: true
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

###############################################################
sniffer:
  enable: true
  # 对 redir-host 类型识别的流量进行强制嗅探
  # 如：Tun、Redir 和 TProxy 并 DNS 为 redir-host 皆属于
  force-dns-mapping: true
  # 对所有未获取到域名的流量进行强制嗅探
  parse-pure-ip: true
  # 是否使用嗅探结果作为实际访问，默认 true
  # 全局配置，优先级低于 sniffer.sniff 实际配置
  override-destination: true
  sniff:
    QUIC:
      ports:
        - 443
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      # 是否使用嗅探结果作为实际访问
      override-destination: true
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - +.oray.com
    - +.sunlogin.net
    - +.push.apple.com

###############################################################
dns:
  enable: true
  ipv6: true
  respect-rules: false
  cache-algorithm: arc
  use-hosts: false
  use-system-hosts: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - DOMAIN-SUFFIX,localhost.work.weixin.qq.com,real-ip
    - DOMAIN-SUFFIX,parsec.app,real-ip
    - geosite,private,real-ip
    - geosite,connectivity-check,real-ip
    - geosite,google-cn,real-ip
    - geosite,apple,real-ip
    - geosite,category-public-tracker,real-ip
    - geosite,category-games,real-ip
    - geosite,category-speedtest,real-ip
    - geosite,microsoft,real-ip
    - geosite,cn,real-ip
    - MATCH,fake-ip
  nameserver:
    - 233.5.5.5
    - 119.29.29.29
    - 114.114.114.114
###############################################################
